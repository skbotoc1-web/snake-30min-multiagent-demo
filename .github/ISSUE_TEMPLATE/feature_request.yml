name: Feature Request
description: Neue Funktion vorschlagen
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Welches Problem löst das Feature?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Vorschlag
      description: Konkrete Lösungsidee
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Akzeptanzkriterien
      placeholder: |
        - [ ] ...
        - [ ] ...
